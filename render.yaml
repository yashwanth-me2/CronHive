services:
  - type: web
    name: cronhive-api
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cronhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cronhive-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

  - type: redis
    name: cronhive-redis
    plan: free
    region: oregon
    ipAllowList: [] # Allows internal connections only

databases:
  - name: cronhive-db
    databaseName: cronhive
    user: cronhive_user
    plan: free
    region: oregon
